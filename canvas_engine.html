<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Jimeng Canvas Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/@tldraw/tldraw@2.1.4/tldraw.css" />
    <style>
        body, html, #root { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #f0f2f5; }
        .ai-tools {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; gap: 12px; background: white; padding: 10px 20px;
            border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee;
        }
        .btn-extract { background: #00c2ff; color: white; border: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
    <script type="importmap">
        { "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "@tldraw/tldraw": "https://esm.sh/@tldraw/tldraw@2.1.4?deps=react@18.2.0,react-dom@18.2.0"
        } }
    </script>
</head>
<body>
    <div id="root"></div>
    <div class="ai-tools">
        <button class="btn-extract" id="extract-btn">💬 添加到对话参考</button>
        <div style="color: #ccc; width: 1px; height: 20px; background: #eee;"></div>
        <div style="font-size: 12px; color: #999; line-height: 30px;">[V]选择 [T]文字 [P]画笔 [空格]拖拽</div>
    </div>

    <script type="module">
        import React, { useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Tldraw, useEditor, exportToBlob } from '@tldraw/tldraw';

        function Bridge() {
            const editor = useEditor();
            useEffect(() => {
                window.editor = editor;
                document.getElementById('extract-btn').onclick = async () => {
                    const ids = editor.getSelectedShapeIds();
                    if (ids.length === 0) return alert("请先框选画布上的内容");
                    const blob = await exportToBlob({ editor, ids, format: 'png', opts: { background: false } });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const payload = Date.now() + "|||" + reader.result;
                        const bridgeInput = window.parent.document.querySelector('input[aria-label="canvas_bridge"]');
                        if (bridgeInput) {
                            const setter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, "value").set;
                            setter.call(bridgeInput, payload);
                            bridgeInput.dispatchEvent(new Event('input', { bubbles: true }));
                        }
                    };
                    reader.readAsDataURL(blob);
                };
            }, [editor]);
            return null;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement('div', { style: { inset: 0, position: 'absolute' } }, 
            React.createElement(Tldraw, { persistenceKey: "jimeng-v5" }, React.createElement(Bridge))
        ));

        window.addImageToCanvas = (url) => {
            const assetId = `asset:${Date.now()}`;
            window.editor.createAssets([{ id: assetId, type: 'image', props: { src: url, w: 512, h: 512, name: 'ai.png', mimeType: 'image/png' } }]);
            window.editor.createShapes([{ type: 'image', x: 200, y: 200, props: { assetId, w: 512, h: 512 } }]);
        };
    </script>
</body>
</html>
