<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI Pro Canvas Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f0f2f5; font-family: sans-serif; height: 100vh; overflow: hidden; position: relative; }
        
        /* 顶部工具栏 */
        .toolbar { background: white; padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; gap: 15px; align-items: center; z-index: 10; border-bottom: 1px solid #eee; position: relative; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; background: #f8f9fa; color: #333; cursor: pointer; font-size: 14px; font-weight: bold; border: 1px solid #ddd; }
        .btn:hover { background: #e2e6ea; border-color: #ccc; }
        
        /* 画布主容器 (设为 relative，以便内部的悬浮框绝对定位) */
        .canvas-container-wrapper { width: 100vw; height: calc(100vh - 72px); position: relative; overflow: hidden; cursor: default; }
        .canvas-container { position: absolute; top: 0; left: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 4px; background-color: white; }

        /* 悬浮工具栏 (完美还原截图1，移除 display:none，由 JS 控制) */
        .context-toolbar {
            position: absolute; display: none; background: white; border-radius: 20px; padding: 8px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); border: 1px solid #eee; z-index: 1000;
            white-space: nowrap; font-size: 13px; color: #333; pointer-events: auto; gap: 16px; align-items: center;
        }
        .context-item { cursor: pointer; color: #333; transition: color 0.2s; display: flex; align-items: center; gap: 5px; }
        .context-item:hover { color: #00c2ff; }

        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="toolbar">
        <span style="font-weight: 900; font-size: 16px; color: #333; margin-right: 20px;">🎨 Pro Canvas</span>
        <button class="btn" onclick="document.getElementById('file-input').click();">📤 本地上传</button>
        <button class="btn" onclick="addText()">T 添加文本框</button>
        <span style="color:#ddd;">|</span>
        <button class="btn" onclick="clearCanvas()" style="color: #666; font-weight: normal;">🔄 清空画布</button>
        <p style="color:#999; font-size: 12px; margin-left: auto;">【右键】居中 | 【空格+拖拽】移动</p>
    </div>

    <input type="file" id="file-input" accept="image/*" onchange="handleLocalImage(this)">

    <div class="canvas-container-wrapper" id="wrapper">
        
        <div class="context-toolbar" id="context-toolbar">
            <div class="context-item" onclick="addToDialogue()" style="font-weight:bold; color:#00c2ff;">💬 添加到对话</div>
            <span style="color:#eee;">|</span>
            <div class="context-item">T 改文字</div>
            <div class="context-item">🪄 扩图</div>
            <div class="context-item">💎 超清</div>
            <div class="context-item" onclick="deleteSelected()" style="color: #FF4B4B;">🗑️ 删除</div>
        </div>

        <canvas id="c"></canvas>
    </div>

    <script>
        const wrapper = document.getElementById('wrapper');
        const originalWidth = 1400; 
        const originalHeight = 1000; 
        
        const canvas = new fabric.Canvas('c', {
            width: originalWidth, height: originalHeight, backgroundColor: '#ffffff',
            preserveObjectStacking: true, selectionColor: 'rgba(0, 194, 255, 0.1)', selectionBorderColor: '#00c2ff'
        });

        // 视觉还原：精确还原虚线蓝框和白心圆点
        fabric.Object.prototype.set({
            transparentCorners: false, 
            cornerColor: '#ffffff', 
            cornerStrokeColor: '#00c2ff',
            borderColor: '#00c2ff', 
            cornerSize: 10, 
            padding: 5, 
            cornerStyle: 'circle', 
            borderDashArray: [5, 5] 
        });

        // 初始居中
        canvas.relativePan(new fabric.Point((wrapper.clientWidth - originalWidth) / 2, (wrapper.clientHeight - originalHeight) / 2));

        // ==========================================
        // 数据桥接：发送 Base64 到 Python
        // ==========================================
        function addToDialogue() {
            const target = canvas.getActiveObject();
            if (!target) return;
            
            if (target.type === 'image') {
                const imageBase64 = target.toDataURL({ format: 'png', quality: 0.9, multiplier: 1.5 });
                const payload = Date.now() + "|||" + imageBase64; 
                
                const parentDoc = window.parent.document;
                const bridgeInput = parentDoc.querySelector('input[aria-label="canvas_bridge"]');
                
                if (bridgeInput) {
                    const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, "value").set;
                    nativeInputValueSetter.call(bridgeInput, payload);
                    bridgeInput.dispatchEvent(new Event('input', { bubbles: true }));
                }
            } else {
                alert("目前只支持将图片添加到对话！");
            }
            ctxToolbar.style.display = 'none';
        }

        // ==========================================
        // 🌟 核心修复：精准计算悬浮工具栏位置 (死死吸附)
        // ==========================================
        const ctxToolbar = document.getElementById('context-toolbar');
        canvas.on('selection:created', updateToolbarPosition);
        canvas.on('selection:updated', updateToolbarPosition);
        canvas.on('selection:cleared', () => ctxToolbar.style.display = 'none');
        canvas.on('object:moving', updateToolbarPosition);

        function updateToolbarPosition() {
            const target = canvas.getActiveObject();
            if (!target) return;
            
            // getBoundingRect 能够完美捕捉经过缩放、平移和旋转后的元素真实边界框
            const bound = target.getBoundingRect();
            
            ctxToolbar.style.display = 'flex';
            
            const toolbarWidth = ctxToolbar.offsetWidth;
            const toolbarHeight = ctxToolbar.offsetHeight;
            
            // 定位到元素正上方居中，预留 15px 间距
            let left = bound.left + (bound.width / 2) - (toolbarWidth / 2);
            let top = bound.top - toolbarHeight - 15;
            
            // 防止工具栏超出画布可视区域
            if (top < 10) top = 10;
            if (left < 10) left = 10;
            if (left + toolbarWidth > wrapper.clientWidth - 10) {
                left = wrapper.clientWidth - toolbarWidth - 10;
            }
            
            ctxToolbar.style.left = left + 'px';
            ctxToolbar.style.top = top + 'px';
        }

        // --- 其他交互逻辑 ---
        function handleLocalImage(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgObj = new Image();
                imgObj.src = e.target.result;
                imgObj.onload = function() {
                    const fabricImg = new fabric.Image(imgObj, { left: 200, top: 200, angle: 0 });
                    fabricImg.scaleToWidth(Math.min(imgObj.width, 500));
                    canvas.add(fabricImg);
                    canvas.setActiveObject(fabricImg);
                    input.value = ""; 
                }
            }
            reader.readAsDataURL(file);
        }

        function addText() {
            const text = new fabric.IText('双击编辑文本', { left: 200, top: 200, fontFamily: 'sans-serif', fill: '#333333', fontSize: 24 });
            canvas.add(text); canvas.setActiveObject(text);
        }

        function deleteSelected() {
            const target = canvas.getActiveObject();
            if(target){ canvas.remove(target); }
            ctxToolbar.style.display = 'none';
        }

        function clearCanvas() {
            if(confirm("确定清空画布吗？")) {
                canvas.clear(); canvas.backgroundColor = '#ffffff'; canvas.renderAll();
            }
        }

        // --- 空格键拖拽与缩放逻辑 ---
        let isSpaceDown = false;
        
        wrapper.addEventListener('mousewheel', (opt) => {
            const delta = opt.wheelDelta;
            let zoom = canvas.getZoom();
            zoom *= 0.999 ** delta;
            if (zoom > 20) zoom = 20;
            if (zoom < 0.1) zoom = 0.1;
            canvas.zoomToPoint({ x: opt.offsetX, y: opt.offsetY }, zoom);
            opt.preventDefault(); opt.stopPropagation();
        });

        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space' && (!canvas.getActiveObject() || !canvas.getActiveObject().isEditing)){
                isSpaceDown = true;
                wrapper.style.cursor = 'grab';
                canvas.selection = false; 
            }
        });
        
        window.addEventListener('keyup', (e) => {
            if(e.code === 'Space'){
                isSpaceDown = false;
                wrapper.style.cursor = 'default';
                canvas.selection = true;
            }
        });

        canvas.on('mouse:down', function(opt) {
            const evt = opt.e;
            if (isSpaceDown) {
                this.isDragging = true; this.selection = false;
                this.lastPosX = evt.clientX; this.lastPosY = evt.clientY;
            }
        });
        
        canvas.on('mouse:move', function(opt) {
            if (this.isDragging) {
                const e = opt.e; const vpt = this.viewportTransform;
                vpt[4] += e.clientX - this.lastPosX; vpt[5] += e.clientY - this.lastPosY;
                this.requestRenderAll();
                this.lastPosX = e.clientX; this.lastPosY = e.clientY;
            }
        });
        
        canvas.on('mouse:up', function(opt) {
            this.setViewportTransform(this.viewportTransform);
            this.isDragging = false; this.selection = true;
        });

        wrapper.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            canvas.relativePan(new fabric.Point((wrapper.clientWidth - canvas.width * canvas.getZoom()) / 2, (wrapper.clientHeight - canvas.height * canvas.getZoom()) / 2));
        });

        window.addImageToCanvas = function(url) {
            fabric.Image.fromURL(url, function(img) {
                img.scaleToWidth(400);
                img.set({ left: originalWidth/2 - 200, top: originalHeight/2 - img.getScaledHeight()/2 });
                canvas.add(img);
                canvas.setActiveObject(img);
                canvas.requestRenderAll();
            }, { crossOrigin: 'anonymous' });
        }
    </script>
</body>
</html>
