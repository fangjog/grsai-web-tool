<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI Pro Canvas Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f0f2f5; height: 100vh; overflow: hidden; }
        .canvas-container-wrapper { width: 100vw; height: 100vh; position: relative; overflow: hidden; cursor: default; }
        
        /* 悬浮工具栏 (吸附在元素上方) */
        .context-toolbar {
            position: absolute; display: none; background: white; border-radius: 20px; padding: 6px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); border: 1px solid #eee; z-index: 1000;
            white-space: nowrap; font-size: 13px; color: #333; pointer-events: auto; gap: 16px; align-items: center;
        }
        .context-item { cursor: pointer; color: #333; transition: color 0.2s; display: flex; align-items: center; gap: 5px; }
        .context-item:hover { color: #00c2ff; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <input type="file" id="file-input" accept="image/*" onchange="handleLocalImage(this)">

    <div class="canvas-container-wrapper" id="wrapper">
        <div class="context-toolbar" id="context-toolbar">
            <div class="context-item" onclick="addToDialogue()" style="font-weight:bold; color:#00c2ff;">💬 添加到对话</div>
            <span style="color:#eee;">|</span>
            <div class="context-item" id="text-edit-btn" style="display:none;">T 改文字</div>
            <div class="context-item">🪄 扩图</div>
            <div class="context-item">💎 超清</div>
            <div class="context-item" onclick="deleteSelected()" style="color: #FF4B4B;">🗑️ 删除</div>
        </div>
        <canvas id="c"></canvas>
    </div>

    <script>
        const wrapper = document.getElementById('wrapper');
        const canvas = new fabric.Canvas('c', {
            width: window.innerWidth, height: window.innerHeight, backgroundColor: '#f0f2f5',
            preserveObjectStacking: true, selectionColor: 'rgba(0, 194, 255, 0.1)', selectionBorderColor: '#00c2ff'
        });

        fabric.Object.prototype.set({
            transparentCorners: false, cornerColor: '#ffffff', cornerStrokeColor: '#00c2ff',
            borderColor: '#00c2ff', cornerSize: 10, padding: 5, cornerStyle: 'circle', borderDashArray: [5, 5] 
        });

        // ==========================================
        // 🌟 核心功能修复：添加文本框
        // ==========================================
        window.addText = function() {
            const text = new fabric.IText('输入文本', {
                left: canvas.width / 2, top: canvas.height / 2,
                fontFamily: 'sans-serif', fill: '#333333', fontSize: 32,
                originX: 'center', originY: 'center'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
            canvas.renderAll();
        };

        window.uploadLocal = function() { document.getElementById('file-input').click(); };
        window.clearCanvas = function() { if(confirm("清空吗？")) { canvas.clear(); canvas.backgroundColor = '#f0f2f5'; canvas.renderAll(); } };
        window.centerView = function() { canvas.setViewportTransform([1, 0, 0, 1, 0, 0]); canvas.renderAll(); };

        // 数据桥接
        function addToDialogue() {
            const target = canvas.getActiveObject();
            if (!target) return;
            let content = "";
            let type = "";
            if (target.type === 'image') {
                content = target.toDataURL({ format: 'png', quality: 0.8, multiplier: 1 });
                type = "add_image_to_chat";
            } else {
                content = target.text;
                type = "add_text_to_chat";
            }
            const payload = Date.now() + "|||" + content; 
            const bridgeInput = window.parent.document.querySelector('input[aria-label="canvas_bridge"]');
            if (bridgeInput) {
                const nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, "value").set;
                nativeSetter.call(bridgeInput, payload);
                bridgeInput.dispatchEvent(new Event('input', { bubbles: true }));
            }
            ctxToolbar.style.display = 'none';
        }

        // 悬浮框定位 (精准吸附)
        const ctxToolbar = document.getElementById('context-toolbar');
        canvas.on('selection:created', updateToolbar);
        canvas.on('selection:updated', updateToolbar);
        canvas.on('selection:cleared', () => ctxToolbar.style.display = 'none');
        canvas.on('object:moving', updateToolbar);
        canvas.on('object:scaling', updateToolbar);

        function updateToolbar() {
            const target = canvas.getActiveObject();
            if (!target) return;
            const bound = target.getBoundingRect();
            ctxToolbar.style.display = 'flex';
            document.getElementById('text-edit-btn').style.display = (target.type === 'i-text' ? 'block' : 'none');
            ctxToolbar.style.left = (bound.left + bound.width/2 - ctxToolbar.offsetWidth/2) + 'px';
            ctxToolbar.style.top = (bound.top - ctxToolbar.offsetHeight - 15) + 'px';
        }

        function handleLocalImage(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                fabric.Image.fromURL(e.target.result, (img) => {
                    img.scaleToWidth(400);
                    canvas.add(img).setActiveObject(img);
                });
            };
            reader.readAsDataURL(file);
        }

        function deleteSelected() { canvas.remove(canvas.getActiveObject()); ctxToolbar.style.display = 'none'; }

        // 空格拖拽 & 缩放
        let isSpaceDown = false;
        window.addEventListener('keydown', (e) => { if(e.code === 'Space' && !canvas.getActiveObject()?.isEditing) { isSpaceDown = true; wrapper.style.cursor='grab'; canvas.selection=false; } });
        window.addEventListener('keyup', (e) => { isSpaceDown = false; wrapper.style.cursor='default'; canvas.selection=true; });
        canvas.on('mouse:down', function(opt) { if(isSpaceDown) { this.isDragging=true; this.lastPosX=opt.e.clientX; this.lastPosY=opt.e.clientY; } });
        canvas.on('mouse:move', function(opt) { if(this.isDragging) { let vpt=this.viewportTransform; vpt[4]+=opt.e.clientX-this.lastPosX; vpt[5]+=opt.e.clientY-this.lastPosY; this.requestRenderAll(); this.lastPosX=opt.e.clientX; this.lastPosY=opt.e.clientY; } });
        canvas.on('mouse:up', function() { this.setViewportTransform(this.viewportTransform); this.isDragging=false; });
        wrapper.addEventListener('mousewheel', (opt) => { let zoom = canvas.getZoom() * (0.999 ** opt.wheelDelta); if(zoom>20)zoom=20; if(zoom<0.01)zoom=0.01; canvas.zoomToPoint({x:opt.offsetX, y:opt.offsetY}, zoom); opt.preventDefault(); opt.stopPropagation(); });

        window.addImageToCanvas = function(url) {
            fabric.Image.fromURL(url, (img) => { img.scaleToWidth(400); canvas.add(img).setActiveObject(img); }, {crossOrigin:'anonymous'});
        }
    </script>
</body>
</html>
